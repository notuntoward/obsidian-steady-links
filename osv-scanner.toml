# ---------- Undici vulnerabilities (added Jun 2026) -------------------
# These are all in `undici`, the Node.js fetch/XHR HTTP library.
# undici is a transitive dependency brought in by Node's own `fetch`
# globals and by dev-only tooling (@actions/*, fast-check's async
# runners, test infrastructure).  The obsidian-steady-links plugin
# ships a single JS bundle (`main.js`) that runs inside Obsidian's
# Electron desktop runtime.  Undici is NOT bundled into the plugin
# (Obsidian provides its own fetch implementation via Chromium) and
# none of the observed vulnerability classes (HTTP header injection,
# WebSocket DoS, ProxyAgent TLS bypass, decompression bombs) apply
# to plugin code.  They would only matter if we ran a Node.js HTTP
# server or client in production.

[[IgnoredVulns]]
id = "GHSA-35p6-xmwp-9g52"
reason = "undici HTTP response queue poisoning; undici is transitive/dev-only, not bundled into plugin, plugin runs in Obsidian Electron which provides its own HTTP stack."

[[IgnoredVulns]]
id = "GHSA-g8m3-5g58-fq7m"
reason = "undici Set-Cookie SameSite attribute downgrade; same transitive/dev-only rationale — undici not in production bundle."

