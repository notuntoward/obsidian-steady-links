<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Steady Links Playwright Harness</title>
		<style>
			:root {
				color-scheme: light;
				--background-primary: #fbfaf6;
				--background-secondary: #f1ecdf;
				--text-normal: #2b261e;
				--text-muted: #73685a;
				--interactive-accent: #2f6d62;
				--font-text: "Georgia", "Iowan Old Style", serif;
				--font-text-size: 18px;
			}

			body {
				margin: 0;
				padding: 32px;
				background:
					radial-gradient(circle at top left, rgba(47, 109, 98, 0.08), transparent 34%),
					linear-gradient(180deg, #fdfbf5, #f3ede2 70%, #efe8da);
				color: var(--text-normal);
				font-family: var(--font-text);
			}

			.steady-links-harness {
				max-width: 760px;
				margin: 0 auto;
				padding: 24px 28px;
				background: rgba(251, 250, 246, 0.94);
				border: 1px solid rgba(43, 38, 30, 0.12);
				border-radius: 18px;
				box-shadow: 0 18px 52px rgba(68, 49, 24, 0.12);
			}

			.cm-editor {
				font-family: var(--font-text);
				font-size: var(--font-text-size);
				line-height: 1.55;
				background: transparent;
			}

			.cm-content {
				padding: 0;
			}

			.cm-line {
				padding: 0;
			}
		</style>
	</head>
	<body>
		<script type="module" src="./harness.ts"></script>
	</body>
</html>
